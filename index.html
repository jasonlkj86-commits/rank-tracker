<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>스마트스토어 순위 트래커</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #0f0f13;
  --surface: #1a1a22;
  --surface2: #22222d;
  --border: rgba(255,255,255,0.08);
  --text: #f0eff4;
  --muted: #8b8a9a;
  --accent: #7c6af7;
  --up: #4ecdc4;
  --down: #ff6b6b;
  --neutral: #8b8a9a;
  --font: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; padding: 2rem 1.5rem 4rem; }

/* ── 헤더 ── */
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); }
.header-left { display: flex; align-items: center; gap: 1rem; }
.back-btn { display: none; align-items: center; gap: 0.4rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 0.85rem; padding: 0.45rem 0.9rem; cursor: pointer; transition: all 0.15s; }
.back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.back-btn.visible { display: flex; }
h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; background: linear-gradient(135deg, #fff 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.header-right { display: flex; align-items: center; gap: 0.75rem; }
.last-updated { font-size: 0.78rem; color: var(--muted); }
.icon-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 1.1rem; width: 38px; height: 38px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.icon-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }

/* ── 대시보드 ── */
#dashboard { display: block; }
.dashboard-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.section-title { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); }
.add-btn { background: transparent; border: 1px dashed rgba(255,255,255,0.2); border-radius: 100px; padding: 0.35rem 0.9rem; font-size: 0.8rem; color: var(--muted); cursor: pointer; transition: all 0.15s; }
.add-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.4); }

.products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }

.product-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 1.25rem;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
  position: relative;
  overflow: hidden;
}
.product-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--card-accent, var(--accent));
  opacity: 0.6;
  transition: opacity 0.2s;
}
.product-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,0.3); }
.product-card:hover::before { opacity: 1; }

.card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1rem; gap: 0.75rem; }
.card-thumb { width: 54px; height: 54px; border-radius: 10px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }
.card-thumb-placeholder { width: 54px; height: 54px; border-radius: 10px; flex-shrink: 0; background: var(--surface2); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
.card-info { flex: 1; min-width: 0; }
.card-name { font-size: 0.92rem; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-store { font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }
.card-arrow { font-size: 1rem; color: var(--muted); opacity: 0.4; flex-shrink: 0; }
.product-card:hover .card-arrow { opacity: 0.8; }

.kw-list { display: flex; flex-direction: column; gap: 0.55rem; }
.kw-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  padding: 0.5rem 0.75rem;
}
.kw-name { font-size: 0.82rem; color: var(--muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.kw-right { display: flex; align-items: center; gap: 0.6rem; flex-shrink: 0; }
.kw-rank { font-size: 1rem; font-weight: 800; letter-spacing: -0.03em; }
.kw-rank .unit { font-size: 0.72rem; font-weight: 500; color: var(--muted); }
.kw-rank.no-rank { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
.kw-change { font-size: 0.72rem; font-weight: 700; min-width: 52px; text-align: right; }
.kw-change.up { color: var(--up); }
.kw-change.down { color: var(--down); }
.kw-change.neutral { color: var(--neutral); }

.card-no-data { text-align: center; padding: 1.5rem 0; color: var(--muted); font-size: 0.82rem; line-height: 1.8; }

/* ── 상세 뷰 ── */
#detail { display: none; }
.tabs-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.tabs-row::-webkit-scrollbar { display: none; }
.product-tab { display: flex; align-items: center; gap: 0.4rem; background: var(--surface); border: 1px solid var(--border); border-radius: 100px; padding: 0.45rem 1rem; font-size: 0.82rem; font-weight: 500; color: var(--muted); cursor: pointer; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
.product-tab:hover { color: var(--text); }
.product-tab.active { background: var(--accent); border-color: var(--accent); color: #fff; font-weight: 600; }
.section-label { font-size: 0.72rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 0.875rem; margin-bottom: 2rem; }
.rank-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.1rem 1.1rem 0.9rem; cursor: pointer; transition: border-color 0.2s, transform 0.15s; position: relative; overflow: hidden; }
.rank-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: var(--card-color, var(--accent)); opacity: 0; transition: opacity 0.2s; }
.rank-card:hover { border-color: rgba(255,255,255,0.15); transform: translateY(-2px); }
.rank-card.active { border-color: var(--card-color, var(--accent)); }
.rank-card.active::before { opacity: 1; }
.card-keyword { font-size: 0.8rem; color: var(--muted); margin-bottom: 0.6rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-rank { font-size: 2.2rem; font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
.card-rank .unit { font-size: 0.9rem; font-weight: 500; color: var(--muted); margin-left: 2px; }
.card-rank.no-rank { font-size: 1.1rem; color: var(--muted); }
.card-change { display: flex; align-items: center; gap: 0.3rem; margin-top: 0.45rem; font-size: 0.75rem; font-weight: 600; }
.card-change.up { color: var(--up); }
.card-change.down { color: var(--down); }
.card-change.neutral { color: var(--neutral); }

.chart-section, .all-chart-section { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; margin-bottom: 1.25rem; }
.chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; flex-wrap: wrap; gap: 0.5rem; }
.chart-title { font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 0.5rem; }
.kw-badge { font-size: 0.72rem; font-weight: 600; background: rgba(124,106,247,0.15); color: var(--accent); border-radius: 100px; padding: 0.2rem 0.65rem; }
.chart-note { font-size: 0.72rem; color: var(--muted); }
.chart-wrap { position: relative; height: 250px; }
.legend { display: flex; flex-wrap: wrap; gap: 0.75rem; margin-top: 1rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.legend-item { display: flex; align-items: center; gap: 0.4rem; font-size: 0.76rem; color: var(--muted); cursor: pointer; padding: 0.2rem 0.5rem; border-radius: 6px; transition: background 0.15s; }
.legend-item:hover { background: rgba(255,255,255,0.05); }
.legend-item.active { color: var(--text); }
.legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── 로딩 ── */
.loading { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; color: var(--muted); gap: 1rem; }
.spinner { width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 모달 ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; padding: 1rem; backdrop-filter: blur(4px); }
.modal-overlay.hidden { display: none; }
.modal { background: var(--surface2); border: 1px solid rgba(255,255,255,0.12); border-radius: 20px; width: 100%; max-width: 460px; max-height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 1.25rem 1.5rem; border-bottom: 1px solid var(--border); }
.modal-header h2 { font-size: 1.05rem; font-weight: 700; }
.modal-body { padding: 1.5rem; overflow-y: auto; display: flex; flex-direction: column; gap: 1rem; }
.modal-footer { padding: 1rem 1.5rem; border-top: 1px solid var(--border); display: flex; gap: 0.5rem; justify-content: flex-end; }
.modal-desc { font-size: 0.82rem; color: var(--muted); line-height: 1.6; }
.modal-hint { font-size: 0.78rem; color: var(--muted); line-height: 1.7; }
.modal-hint a { color: var(--accent); text-decoration: none; }
label { font-size: 0.8rem; font-weight: 600; color: var(--muted); }
input[type=text], input[type=password], input:not([type]) { width: 100%; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 0.9rem; color: var(--text); font-size: 0.88rem; font-family: var(--font); outline: none; transition: border-color 0.15s; }
input:focus { border-color: var(--accent); }
input::placeholder { color: var(--muted); }
.parsed-box { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 0.9rem; font-size: 0.82rem; color: var(--muted); line-height: 1.7; }
.parsed-box span { color: var(--up); font-weight: 600; }
.parsed-box.error { border-color: rgba(255,107,107,0.3); color: var(--down); }
.keyword-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; min-height: 36px; }
.kw-tag { display: flex; align-items: center; gap: 0.35rem; background: rgba(124,106,247,0.15); border: 1px solid rgba(124,106,247,0.3); border-radius: 100px; padding: 0.25rem 0.7rem 0.25rem 0.8rem; font-size: 0.8rem; color: var(--accent); }
.kw-tag button { background: none; border: none; color: var(--accent); cursor: pointer; font-size: 0.9rem; line-height: 1; opacity: 0.7; padding: 0; }
.kw-input-row { display: flex; gap: 0.5rem; }
.kw-input-row input { flex: 1; }
.btn-primary { background: var(--accent); border: none; border-radius: 10px; color: #fff; font-size: 0.88rem; font-weight: 600; padding: 0.6rem 1.25rem; cursor: pointer; transition: opacity 0.15s; font-family: var(--font); }
.btn-primary:hover { opacity: 0.85; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-danger { background: rgba(255,107,107,0.12); border: 1px solid rgba(255,107,107,0.25); border-radius: 10px; color: var(--down); font-size: 0.88rem; font-weight: 600; padding: 0.6rem 1.25rem; cursor: pointer; transition: background 0.15s; font-family: var(--font); margin-right: auto; }
.btn-danger:hover { background: rgba(255,107,107,0.2); }
.btn-secondary { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--muted); font-size: 0.88rem; padding: 0.6rem 1.25rem; cursor: pointer; font-family: var(--font); }
.btn-secondary:hover { color: var(--text); }
.toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--surface2); border: 1px solid rgba(255,255,255,0.12); border-radius: 100px; padding: 0.6rem 1.25rem; font-size: 0.85rem; color: var(--text); z-index: 200; white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.toast.hidden { display: none; }
.toast.success { border-color: rgba(78,205,196,0.4); color: var(--up); }
.toast.error { border-color: rgba(255,107,107,0.4); color: var(--down); }

/* ── 순서 변경 버튼 ── */
.sort-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--muted); font-size: 0.8rem; width: 26px; height: 26px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; flex-shrink: 0; }
.sort-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.2); }
.sort-btn:disabled { opacity: 0.2; cursor: not-allowed; }
.card-sort-btns { display: flex; flex-direction: column; gap: 3px; flex-shrink: 0; }

@media (max-width: 600px) {
  body { padding: 1.25rem 1rem 3rem; }
  .header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
  .products-grid { grid-template-columns: 1fr 1fr; }
  .cards-grid { grid-template-columns: 1fr 1fr; }
  .card-thumb { width: 42px; height: 42px; }
  .card-thumb-placeholder { width: 42px; height: 42px; font-size: 1.2rem; }
  .card-name { font-size: 0.8rem; }
}
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-left">
    <button class="back-btn" id="back-btn">← 대시보드</button>
    <h1>키워드 순위 트래커</h1>
  </div>
  <div class="header-right">
    <span class="last-updated" id="last-updated"></span>
    <button class="icon-btn" id="crawl-btn" title="지금 수집" onclick="triggerCrawl()">🔄</button>
    <button class="icon-btn" id="settings-btn" title="설정">⚙️</button>
  </div>
</div>

<!-- ══ 대시보드 뷰 ══ -->
<div id="dashboard">
  <div class="dashboard-header">
    <div class="section-title">전체 상품 현황</div>
    <button class="add-btn" id="add-product-btn">+ 상품 추가</button>
  </div>
  <div class="products-grid" id="products-grid">
    <div class="loading"><div class="spinner"></div></div>
  </div>
</div>

<!-- ══ 상세 뷰 ══ -->
<div id="detail">
  <div class="tabs-row" id="product-tabs"></div>
  <div class="section-label">현재 순위 (최신 기준)</div>
  <div class="cards-grid" id="cards-grid"></div>
  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title">순위 변동 추이 <span class="kw-badge" id="selected-kw-label">전체</span></div>
      <div class="chart-note">※ 1위 = 최상단 노출</div>
    </div>
    <div class="chart-wrap"><canvas id="mainChart"></canvas></div>
    <div class="legend" id="chart-legend"></div>
  </div>
  <div class="all-chart-section">
    <div class="chart-header">
      <div class="chart-title">키워드별 현재 순위 비교</div>
      <div class="chart-note">낮은 숫자 = 더 좋은 순위</div>
    </div>
    <div class="chart-wrap" id="bar-chart-wrap" style="height:180px;">
      <canvas id="barChart"></canvas>
    </div>
  </div>
</div>

<!-- 설정 모달 -->
<div class="modal-overlay hidden" id="settings-modal">
  <div class="modal">
    <div class="modal-header">
      <h2>GitHub 설정</h2>
      <button class="icon-btn" onclick="closeModal('settings-modal')">✕</button>
    </div>
    <div class="modal-body">
      <p class="modal-desc">상품/키워드를 웹에서 추가하려면 GitHub Personal Access Token이 필요합니다.</p>
      <div><label>GitHub 사용자명</label><input id="gh-owner" placeholder="예: jasonlkj86-commits"></div>
      <div><label>레포지토리 이름</label><input id="gh-repo" placeholder="예: rank-tracker"></div>
      <div><label>Personal Access Token</label><input id="gh-token" type="password" placeholder="ghp_..."></div>
      <p class="modal-hint"><a href="https://github.com/settings/tokens/new" target="_blank">GitHub → Settings → Developer settings → Tokens (classic)</a><br>권한: <strong>repo</strong> 체크</p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeModal('settings-modal')">취소</button>
      <button class="btn-primary" onclick="saveSettings()">저장</button>
    </div>
  </div>
</div>

<!-- 상품 추가/편집 모달 -->
<div class="modal-overlay hidden" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="product-modal-title">상품 추가</h2>
      <button class="icon-btn" onclick="closeModal('product-modal')">✕</button>
    </div>
    <div class="modal-body">
      <div>
        <label>상품 URL (스마트스토어 또는 네이버 카탈로그)</label>
        <input id="p-url" placeholder="smartstore.naver.com/storeid/products/… 또는 search.shopping.naver.com/catalog/…" oninput="parseProductUrl(this.value)">
        <div id="parsed-info" style="margin-top:0.5rem"></div>
      </div>
      <div><label>상품 이름 (표시용)</label><input id="p-name" placeholder="예: 미니 간판"></div>
      <div>
        <label>추적 키워드</label>
        <div class="keyword-tags" id="keyword-tags"></div>
        <div class="kw-input-row" style="margin-top:0.5rem">
          <input id="kw-input" placeholder="키워드 입력 후 Enter" onkeydown="kwInputKeydown(event)">
          <button class="btn-primary" style="flex-shrink:0" onclick="addKeywordTag()">추가</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-danger" id="delete-product-btn" onclick="deleteCurrentProduct()">삭제</button>
      <button class="btn-secondary" onclick="closeModal('product-modal')">취소</button>
      <button class="btn-primary" id="save-product-btn" onclick="saveProduct()">저장</button>
    </div>
  </div>
</div>

<div class="toast hidden" id="toast"></div>

<script>
const PALETTE = ['#7c6af7','#4ecdc4','#ff9f43','#ff6b9d','#26de81','#fd9644','#a55eea','#45aaf2'];

let config   = { products: [] };
let rankings = { last_updated: null, products: {} };
let currentView = 'dashboard'; // 'dashboard' | 'detail'
let selectedProductId = null;
let selectedKeyword   = null;
let mainChart = null;
let barChart  = null;
let editingProductId = null;
let kwList = [];

// ── GitHub API ──
const GH = {
  get owner() { return localStorage.getItem('gh_owner') || ''; },
  get repo()  { return localStorage.getItem('gh_repo')  || ''; },
  get token() { return localStorage.getItem('gh_token') || ''; },
  isConfigured() { return !!(this.owner && this.repo && this.token); },
  async readFile(path) {
    const r = await fetch(`https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`, {
      headers: { Authorization: `token ${this.token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (!r.ok) throw new Error(`GitHub 읽기 실패 (${r.status})`);
    const d = await r.json();
    const decoded = decodeURIComponent(escape(atob(d.content.replace(/\n/g,''))));
    return { content: JSON.parse(decoded), sha: d.sha };
  },
  async writeFile(path, content, sha, message) {
    const encoded = btoa(unescape(encodeURIComponent(JSON.stringify(content, null, 2) + '\n')));
    const r = await fetch(`https://api.github.com/repos/${this.owner}/${this.repo}/contents/${path}`, {
      method: 'PUT',
      headers: { Authorization: `token ${this.token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify({ message, content: encoded, sha })
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.message || `저장 실패`); }
  }
};

// ── 유틸 ──
function getChange(history) {
  const sorted = [...history].sort((a,b) => a.date < b.date ? -1 : 1);
  const latest = [...sorted].reverse().find(h => h.rank !== null);
  const prev   = [...sorted].reverse().find((h, i) => i > 0 && h.rank !== null);
  return { current: latest?.rank ?? null, prev: prev?.rank ?? null };
}

function changeInfo(current, prev) {
  if (!current) return { text: '100위 밖', cls: 'neutral', arrow: '' };
  if (!prev)    return { text: '첫 수집',  cls: 'neutral', arrow: '' };
  const diff = prev - current;
  if (diff > 0)      return { text: `▲${diff}`, cls: 'up',      arrow: '▲' };
  if (diff < 0)      return { text: `▼${Math.abs(diff)}`, cls: 'down', arrow: '▼' };
  return { text: '유지', cls: 'neutral', arrow: '—' };
}

let toastTimer = null;
function showToast(msg, type = '') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = 'toast hidden'; }, 3000);
}
async function triggerCrawl() {
  if (!GH.isConfigured()) {
    showToast('⚙️ 먼저 GitHub 설정을 완료해주세요', 'error');
    return;
  }
  const btn = document.getElementById('crawl-btn');
  btn.style.animation = 'spin 0.8s linear infinite';
  btn.disabled = true;
  try {
    const r = await fetch(
      `https://api.github.com/repos/${GH.owner}/${GH.repo}/actions/workflows/daily-crawl.yml/dispatches`,
      {
        method: 'POST',
        headers: {
          Authorization: `Bearer ${GH.token}`,
          Accept: 'application/vnd.github+json',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify({ ref: 'main' }),
      }
    );
    if (r.status === 204) {
      showToast('✅ 수집 시작! 1~2분 후 새로고침하세요', 'success');
    } else {
      const err = await r.json().catch(() => ({}));
      showToast(`❌ 실패: ${err.message || r.status}`, 'error');
    }
  } catch(e) {
    showToast('❌ 네트워크 오류', 'error');
  } finally {
    setTimeout(() => {
      btn.style.animation = '';
      btn.disabled = false;
    }, 3000);
  }
}

function openModal(id)  { document.getElementById(id).classList.remove('hidden'); }
function closeModal(id) { document.getElementById(id).classList.add('hidden'); }
document.querySelectorAll('.modal-overlay').forEach(el => {
  el.addEventListener('click', e => { if (e.target === el) closeModal(el.id); });
});

// ── 뷰 전환 ──
function showDashboard() {
  currentView = 'dashboard';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('detail').style.display = 'none';
  document.getElementById('back-btn').classList.remove('visible');
}

function showDetail(productId) {
  currentView = 'detail';
  selectedProductId = productId;
  selectedKeyword = null;
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('detail').style.display = 'block';
  document.getElementById('back-btn').classList.add('visible');
  renderDetailTabs();
  renderDetailCards();
  updateMainChart();
  renderBarChart();
}

document.getElementById('back-btn').addEventListener('click', showDashboard);

// ── 대시보드 렌더링 ──
function renderDashboard() {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = '';

  if (config.products.length === 0) {
    grid.innerHTML = `<div style="color:var(--muted);font-size:0.9rem;padding:2rem 0">
      상품을 추가해서 순위를 추적해보세요
    </div>`;
    return;
  }

  config.products.forEach((product, pi) => {
    const prodData = rankings.products?.[product.id] || {};
    const accentColor = PALETTE[pi % PALETTE.length];

    const card = document.createElement('div');
    card.className = 'product-card';
    card.style.setProperty('--card-accent', accentColor);

    // 키워드 행
    const kwRows = product.keywords.map((kw, ki) => {
      const history = prodData[kw] || [];
      const { current, prev } = getChange(history);
      const ch = changeInfo(current, prev);
      const color = PALETTE[ki % PALETTE.length];
      return `
        <div class="kw-row">
          <span class="kw-name" title="${kw}">${kw}</span>
          <div class="kw-right">
            ${current
              ? `<span class="kw-rank" style="color:${color}">${current}<span class="unit">위</span></span>`
              : `<span class="kw-rank no-rank">-</span>`}
            <span class="kw-change ${ch.cls}">${ch.text}</span>
          </div>
        </div>`;
    }).join('');

    const total = config.products.length;
    card.innerHTML = `
      <div class="card-top">
        ${product.image
          ? `<img class="card-thumb" src="${product.image}" alt="${product.name}" onerror="this.style.display='none'">`
          : `<div class="card-thumb-placeholder">${product.type === 'catalog' ? '🗂' : '📦'}</div>`}
        <div class="card-info">
          <div class="card-name" title="${product.name}">${product.name}</div>
          <div class="card-store">${product.type === 'catalog' ? '🗂 카탈로그' : product.store_id}</div>
        </div>
        <div class="card-sort-btns" onclick="event.stopPropagation()">
          <button class="sort-btn" ${pi === 0 ? 'disabled' : ''} onclick="moveProduct(${pi}, -1)" title="위로">▲</button>
          <button class="sort-btn" ${pi === total - 1 ? 'disabled' : ''} onclick="moveProduct(${pi}, 1)" title="아래로">▼</button>
        </div>
      </div>
      <div class="kw-list">
        ${product.keywords.length > 0 ? kwRows : '<div class="card-no-data">키워드 없음</div>'}
      </div>`;

    card.addEventListener('click', () => showDetail(product.id));
    grid.appendChild(card);
  });
}

// ── 상세 탭 ──
function renderDetailTabs() {
  const row = document.getElementById('product-tabs');
  row.innerHTML = '';
  config.products.forEach(p => {
    const tab = document.createElement('button');
    tab.className = 'product-tab' + (p.id === selectedProductId ? ' active' : '');
    tab.textContent = p.name + (p.id === selectedProductId ? ' ✏️' : '');
    tab.addEventListener('click', () => {
      if (p.id === selectedProductId) openEditProduct(p.id);
      else { selectedProductId = p.id; selectedKeyword = null; renderDetailTabs(); renderDetailCards(); updateMainChart(); renderBarChart(); }
    });
    row.appendChild(tab);
  });
}

// ── 상세 카드 ──
function renderDetailCards() {
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';
  const product  = config.products.find(p => p.id === selectedProductId);
  const prodData = rankings.products?.[selectedProductId] || {};
  if (!product) return;

  product.keywords.forEach((kw, i) => {
    const history = prodData[kw] || [];
    const { current, prev } = getChange(history);
    const ch = changeInfo(current, prev);
    const color = PALETTE[i % PALETTE.length];

    const card = document.createElement('div');
    card.className = 'rank-card' + (selectedKeyword === kw ? ' active' : '');
    card.style.setProperty('--card-color', color);
    card.innerHTML = `
      <div class="card-keyword" title="${kw}">${kw}</div>
      ${current ? `<div class="card-rank" style="color:${color}">${current}<span class="unit">위</span></div>`
                : `<div class="card-rank no-rank">100위 밖</div>`}
      <div class="card-change ${ch.cls}"><span>${ch.arrow}</span><span>${ch.text}</span></div>`;
    card.addEventListener('click', () => {
      selectedKeyword = selectedKeyword === kw ? null : kw;
      renderDetailCards();
      updateMainChart();
    });
    grid.appendChild(card);
  });
}

// ── 라인 차트 ──
function updateMainChart() {
  const product  = config.products.find(p => p.id === selectedProductId);
  const prodData = rankings.products?.[selectedProductId] || {};
  if (!product) return;

  const keywords = product.keywords;
  const target   = selectedKeyword ? [selectedKeyword] : keywords;
  document.getElementById('selected-kw-label').textContent = selectedKeyword || '전체';

  const allDates = new Set();
  keywords.forEach(kw => (prodData[kw] || []).forEach(h => allDates.add(h.date)));
  const dates = [...allDates].sort();

  const datasets = target.map(kw => {
    const color = PALETTE[keywords.indexOf(kw) % PALETTE.length];
    const map = {};
    (prodData[kw] || []).forEach(h => { map[h.date] = h.rank; });
    return { label: kw, data: dates.map(d => map[d] ?? null), borderColor: color, backgroundColor: color+'22', borderWidth: 2, pointBackgroundColor: color, pointRadius: 4, pointHoverRadius: 6, spanGaps: true, tension: 0.3, fill: !!selectedKeyword };
  });

  if (mainChart) { mainChart.data.labels = dates; mainChart.data.datasets = datasets; mainChart.update(); }
  else {
    const ctx = document.getElementById('mainChart').getContext('2d');
    mainChart = new Chart(ctx, {
      type: 'line', data: { labels: dates, datasets },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a22', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, callbacks: { label: c => c.raw ? ` ${c.dataset.label}: ${c.raw}위` : ` ${c.dataset.label}: 100위 밖` } } },
        scales: {
          x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8a9a', font: { size: 11 }, maxTicksLimit: 10, maxRotation: 30 } },
          y: { reverse: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8a9a', font: { size: 11 }, callback: v => `${v}위` }, title: { display: true, text: '← 상위 노출', color: '#8b8a9a', font: { size: 10 } } }
        }
      }
    });
  }

  document.getElementById('chart-legend').innerHTML = datasets.map(ds => {
    const active = !selectedKeyword || selectedKeyword === ds.label;
    return `<div class="legend-item ${active ? 'active' : ''}" data-kw="${ds.label}">
      <div class="legend-dot" style="background:${ds.borderColor}"></div>${ds.label}</div>`;
  }).join('');
  document.querySelectorAll('.legend-item').forEach(el => {
    el.addEventListener('click', () => {
      selectedKeyword = selectedKeyword === el.dataset.kw ? null : el.dataset.kw;
      renderDetailCards(); updateMainChart();
    });
  });
}

// ── 바 차트 ──
function renderBarChart() {
  const product  = config.products.find(p => p.id === selectedProductId);
  const prodData = rankings.products?.[selectedProductId] || {};
  if (!product) return;
  const keywords = product.keywords;
  const ranks  = keywords.map(kw => { const { current } = getChange(prodData[kw] || []); return current; });
  const colors = keywords.map((_, i) => PALETTE[i % PALETTE.length]);
  document.getElementById('bar-chart-wrap').style.height = Math.max(140, keywords.length * 44 + 60) + 'px';
  if (barChart) { barChart.data.labels = keywords; barChart.data.datasets[0].data = ranks; barChart.data.datasets[0].backgroundColor = colors.map(c=>c+'bb'); barChart.data.datasets[0].borderColor = colors; barChart.update(); return; }
  const ctx = document.getElementById('barChart').getContext('2d');
  barChart = new Chart(ctx, {
    type: 'bar', data: { labels: keywords, datasets: [{ label: '현재 순위', data: ranks, backgroundColor: colors.map(c=>c+'bb'), borderColor: colors, borderWidth: 1.5, borderRadius: 6 }] },
    options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { backgroundColor: '#1a1a22', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, callbacks: { label: c => c.raw ? ` ${c.raw}위` : ' 100위 밖' } } }, scales: { x: { reverse: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#8b8a9a', font: { size: 11 }, callback: v => `${v}위` } }, y: { grid: { display: false }, ticks: { color: '#f0eff4', font: { size: 12 } } } } }
  });
}

// ── 설정 ──
document.getElementById('settings-btn').addEventListener('click', () => {
  document.getElementById('gh-owner').value = GH.owner;
  document.getElementById('gh-repo').value  = GH.repo;
  document.getElementById('gh-token').value = GH.token;
  openModal('settings-modal');
});
function saveSettings() {
  const o = document.getElementById('gh-owner').value.trim();
  const r = document.getElementById('gh-repo').value.trim();
  const t = document.getElementById('gh-token').value.trim();
  if (!o||!r||!t) { showToast('모든 항목을 입력해주세요','error'); return; }
  localStorage.setItem('gh_owner',o); localStorage.setItem('gh_repo',r); localStorage.setItem('gh_token',t);
  closeModal('settings-modal'); showToast('저장 완료 ✓','success');
}

// ── 상품 추가/편집 ──
document.getElementById('add-product-btn').addEventListener('click', openAddProduct);
function openAddProduct() {
  if (!GH.isConfigured()) { showToast('먼저 GitHub 설정(⚙️)을 완료해주세요','error'); return; }
  editingProductId = null; kwList = [];
  document.getElementById('product-modal-title').textContent = '상품 추가';
  document.getElementById('p-url').value = '';
  document.getElementById('p-name').value = '';
  document.getElementById('parsed-info').innerHTML = '';
  document.getElementById('delete-product-btn').style.display = 'none';
  renderKeywordTags(); openModal('product-modal');
}
function openEditProduct(productId) {
  if (!GH.isConfigured()) { showToast('먼저 GitHub 설정(⚙️)을 완료해주세요','error'); return; }
  const p = config.products.find(x => x.id === productId);
  if (!p) return;
  editingProductId = productId; kwList = [...p.keywords];
  document.getElementById('product-modal-title').textContent = '상품 편집';
  document.getElementById('p-url').value = p.type === 'catalog'
    ? `https://search.shopping.naver.com/catalog/${p.id}`
    : `https://smartstore.naver.com/${p.store_id}/products/${p.id}`;
  document.getElementById('p-name').value = p.name;
  document.getElementById('delete-product-btn').style.display = 'block';
  parseProductUrl(document.getElementById('p-url').value);
  renderKeywordTags(); openModal('product-modal');
}
function parseProductUrl(url) {
  const box = document.getElementById('parsed-info');

  // 스마트스토어 상품 URL
  const storeMatch = url.match(/smartstore\.naver\.com\/([^/]+)\/products\/(\d+)/);
  if (storeMatch) {
    const [, storeId, productId] = storeMatch;
    box.innerHTML = `<div class="parsed-box">유형: <span>스마트스토어</span> &nbsp;|&nbsp; 스토어: <span>${storeId}</span> &nbsp;|&nbsp; 상품ID: <span>${productId}</span></div>`;
    return { storeId, productId, type: 'store' };
  }

  // 네이버 카탈로그 URL
  const catalogMatch = url.match(/search\.shopping\.naver\.com\/catalog\/(\d+)/);
  if (catalogMatch) {
    const [, catalogId] = catalogMatch;
    box.innerHTML = `<div class="parsed-box">유형: <span>카탈로그</span> &nbsp;|&nbsp; 카탈로그ID: <span>${catalogId}</span></div>`;
    return { storeId: 'naver-catalog', productId: catalogId, type: 'catalog' };
  }

  box.innerHTML = url ? `<div class="parsed-box error">스마트스토어 또는 카탈로그 URL을 입력하세요</div>` : '';
  return null;
}
function renderKeywordTags() {
  document.getElementById('keyword-tags').innerHTML = kwList.map((kw,i) =>
    `<div class="kw-tag">${kw}<button onclick="removeKeyword(${i})">✕</button></div>`).join('');
}
function removeKeyword(i) { kwList.splice(i,1); renderKeywordTags(); }
function addKeywordTag() {
  const input = document.getElementById('kw-input');
  const kw = input.value.trim();
  if (!kw) return;
  if (kwList.includes(kw)) { showToast('이미 추가된 키워드입니다','error'); return; }
  kwList.push(kw); input.value = ''; renderKeywordTags(); input.focus();
}
function kwInputKeydown(e) { if (e.key==='Enter') { e.preventDefault(); addKeywordTag(); } }

async function moveProduct(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= config.products.length) return;
  const arr = config.products;
  [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
  renderDashboard();
  if (!GH.isConfigured()) return;
  try {
    const { sha } = await GH.readFile('config.json');
    await GH.writeFile('config.json', config, sha);
    showToast('✅ 순서 저장됨', 'success');
  } catch(e) {
    showToast('❌ 저장 실패: ' + e.message, 'error');
  }
}

async function saveProduct() {
  const url  = document.getElementById('p-url').value.trim();
  const name = document.getElementById('p-name').value.trim();
  const parsed = parseProductUrl(url);
  if (!parsed)       { showToast('올바른 상품 URL을 입력해주세요','error'); return; }
  if (!name)         { showToast('상품 이름을 입력해주세요','error'); return; }
  if (kwList.length===0) { showToast('키워드를 최소 1개 추가해주세요','error'); return; }
  const btn = document.getElementById('save-product-btn');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    const { content: cfg, sha } = await GH.readFile('config.json');
    const products = cfg.products || [];
    const newP = { id: parsed.productId, name, store_id: parsed.storeId, type: parsed.type || 'store', keywords: kwList };
    if (editingProductId) { const idx = products.findIndex(p=>p.id===editingProductId); if(idx>=0) products[idx]=newP; else products.push(newP); }
    else { if (products.find(p=>p.id===parsed.productId)) { showToast('이미 등록된 상품입니다','error'); return; } products.push(newP); }
    cfg.products = products;
    await GH.writeFile('config.json', cfg, sha, `상품 업데이트: ${name}`);
    config = cfg;
    closeModal('product-modal');
    showToast('저장 완료! 내일 오전 9시에 첫 순위가 수집됩니다 ✓','success');
    renderDashboard();
    if (currentView === 'detail') renderDetailTabs();
  } catch(e) { showToast(`저장 실패: ${e.message}`,'error'); }
  finally { btn.disabled=false; btn.textContent='저장'; }
}
async function deleteCurrentProduct() {
  if (!editingProductId) return;
  const p = config.products.find(x=>x.id===editingProductId);
  if (!confirm(`"${p?.name}" 상품을 삭제할까요?`)) return;
  const btn = document.getElementById('delete-product-btn');
  btn.disabled = true;
  try {
    const { content: cfg, sha } = await GH.readFile('config.json');
    cfg.products = (cfg.products||[]).filter(x=>x.id!==editingProductId);
    await GH.writeFile('config.json', cfg, sha, `상품 삭제: ${p?.name}`);
    config = cfg;
    closeModal('product-modal');
    showToast('삭제 완료 ✓','success');
    showDashboard();
    renderDashboard();
  } catch(e) { showToast(`삭제 실패: ${e.message}`,'error'); }
  finally { btn.disabled=false; }
}

// ── 초기화 ──
async function init() {
  try {
    const [cfgRes, rkRes] = await Promise.all([
      fetch('./config.json?t='+Date.now()),
      fetch('./data/rankings.json?t='+Date.now())
    ]);
    config   = cfgRes.ok ? await cfgRes.json() : { products: [] };
    rankings = rkRes.ok  ? await rkRes.json()  : { last_updated: null, products: {} };
  } catch(e) {
    config = { products: [] };
    rankings = { last_updated: null, products: {} };
  }
  document.getElementById('last-updated').textContent =
    rankings.last_updated ? `🕐 ${rankings.last_updated}` : '';
  renderDashboard();
  if (!GH.isConfigured()) {
    setTimeout(() => showToast('⚙️ GitHub 설정을 완료하면 상품을 추가할 수 있습니다',''), 1500);
  }
}

init();
